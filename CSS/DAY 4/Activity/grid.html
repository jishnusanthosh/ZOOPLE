<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Fit vs Auto-Fill</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>

    <h2>Auto-Fit (Items Stretch)</h2>

    <div class="grid-fit">
        <div class="box">1</div>
        <div class="box">2</div>
     
    </div>

    <h2>Auto-Fill (Empty Columns Remain)</h2>

    <div class="grid-fill">
        <div class="box">1</div>
        <div class="box">2</div>

    </div>

</body>
</html>
