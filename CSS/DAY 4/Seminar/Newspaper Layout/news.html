<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newspaper Layout</title>
    <link rel="stylesheet" href="news.css">
</head>
<body>

<div class="container">

    <header class="header">
        <h1>Daily News</h1>
    </header>

    <main class="main-story">
        <h2>Main Story</h2>
        <p>
            Major breakthrough in technology as AI continues to
            transform industries across the globe.
        </p>
    </main>

    <section class="side-story side1">
        <h3>Side Story 1</h3>
        <p>Sports team wins championship.</p>
    </section>

    <section class="side-story side2">
        <h3>Side Story 2</h3>
        <p>New education policy announced.</p>
    </section>

    <aside class="advertisement">
        <h2>Advertisement</h2>
        <p>50% OFF on Electronics!</p>
    </aside>

    <footer class="footer">
        <p>© 2026 Daily News. All Rights Reserved.</p>
    </footer>

</div>

</body>
</html>
