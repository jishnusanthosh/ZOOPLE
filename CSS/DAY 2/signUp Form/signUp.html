<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="signUP.css" />
  </head>
  <body>
      <h1>Personal Information</h1>
   
    <div>
      
         
      <form action="submit">
        <label for="fullname">Full Name</label><br />
        <input class="input" type="text" placeholder="enter full name" /><br />
        <br />

        <label for="Email">Email</label><br />
        <input class="input" type="email" placeholder="example@gmail.com" />
        <br />
        <br />
        <label for="age">Age</label><br />
        <input class="input" type="number" placeholder="enter your age" />
        <br />
        <br />
        <label for="date of birth"> Date of Birth</label><br />
        <input class="input" type="date" />
        <br />
        <br />

        <label for="gender"> Gender</label><br />
        <input type="radio" />
        <label for="for male">Male</label>
        <input type="radio" />
        <label for="for female">Female</label><br />
        <br />
        <label for="lanuage">Language Known</label><br />
        <input type="checkbox" />
        <label for="English">English</label>
        <input type="checkbox" />
        <label for="Tamil">Tamil</label>
        <input type="checkbox" />
        <label for="Hindi">Hindi</label>
        <br />
        <br />
        <label for="upload resume">Upload Resume</label><br />
        <input type="file" />
        <br />
        <button>
          Submit
          <form></form>
        </button>
      </form>
    </div>
  </body>
</html>
