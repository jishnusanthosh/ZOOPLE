<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="formpage.css">
</head>
<body>

    <h1> Contact Us Form</h1>

    <div>
        <h2>Contact Us</h2>

        <form>

            <label for="name">Full Name:</label><br>
            <input type="text" id="name" placeholder="Enter your name"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" placeholder="your@email.com"><br><br>

            <label for="password">Password (for registered users):</label><br>
            <input type="password" id="password" placeholder="Enter your password"><br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" placeholder="Enter your phone number"><br><br>

            <label for="date">Preferred Contact Date:</label><br>
            <input type="date" id="date">

            <p>How did you hear about us?</p>

            <input type="radio" >
            <label for="social">Social Media</label><br>

            <input type="radio" >
            <label for="friend">Friend</label><br>

            <input type="radio" >
            <label for="ad">Advertisement</label><br><br>

            <p>Topics you are interested in:</p><br>

            <input type="checkbox">
            <label for="web">Web Development</label><br>

            <input type="checkbox" >
            <label for="design">UIDesign</label><br>

            <input type="checkbox" >
            <label for="marketing">Digital Marketing</label><br><br>

            <textarea rows="5" cols="40"
                placeholder="Write your message here..."></textarea>
            <br><br>

            <button id="submit" type="submit">Submit</button>
            <button id="reset" type="reset">Reset</button>

        </form>

    </fieldset>

</body>
</html>
