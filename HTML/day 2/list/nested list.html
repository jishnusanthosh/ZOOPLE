<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>nested list</h2>

    <ol>
      <li>fruits</li>


      <ol>
        <li>apple</li>
        <li>banana</li>
        <li>orange</li>
      </ol>


      <li>vegetable</li>


      <ul>
        <li>carrot</li>
        <li>tomato</li>
      </ul>


        <li>meat</li>
        <dl>
            <dt>chicken</dt>
            <dd>meat from a chicken</dd>

            <dt>fish</dt>
            <dd>meat from a fish</dd>
        </dl>

    </ol>
  </body>
</html>
