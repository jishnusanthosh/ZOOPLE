<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Contact Form</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/1d4bb831de.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="container">

    <div class="content">

        <!-- Left Side -->
        <div class="left-side">

            <div class="details">
                <i class="fas fa-map-marker-alt"></i>

                <div class="topic">Address</div>

                <div class="text-one">Street 2</div>

                <div class="text-two">Kochi, Kerala</div>
            </div>

            <div class="details">
                <i class="fas fa-phone-alt"></i>

                <div class="topic">Phone</div>

                <div class="text-one">+91 1800 423 321</div>

                <div class="text-two">+91 1800 123 456</div>
            </div>

            <div class="details">
                <i class="fas fa-envelope"></i>

                <div class="topic">Email</div>

                <div class="text-one">jishnusanthosh321@gmail.com</div>

                <div class="text-two">info@gmail.com</div>
            </div>

        </div>

        <!-- Right Side -->
        <div class="right-side">

            <div class="topic-text">
                Send us a Message
            </div>

            <p>
                If you have any work from me or any types of queries related
                to my tutorial, you can send me a message from here.
            </p>

            <form action="#">

                <div class="input-box">
                    <input type="text" placeholder="Enter your name" required>
                </div>

                <div class="input-box">
                    <input type="email" placeholder="Enter your email" required>
                </div>

                <div class="input-box message-box">
                    <textarea placeholder="Enter your message" required></textarea>
                </div>

                <div class="button">
                    <input type="submit" value="Send Now">
                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
