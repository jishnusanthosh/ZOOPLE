<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <link rel="stylesheet" href="./porfile.css" />
  </head>
  <body>
    <div class="profile-card">
      <div class="image">
        <img src="profile.png" class="profile-img" />
      </div>
      <div class="text-data">
        <span class="name">Zoople</span>
        <span class="job">Developer</span>
        <div class="media-buttons">
          <a href="a" style="background: #4267b2" class="link">
            <i class="fa-brands fa-facebook-f"></i>
          </a>
          <a href="a" style="background: #1da1f2" class="link">
            <i class="fa-brands fa-twitter"></i>
          </a>
          <a href="a" style="background: #de1160" class="link">
            <i class="fa-brands fa-instagram"></i>
          </a>
          <a href="a" style="background: #1da1f2" class="link">
            <i class="fa-brands fa-linkedin"></i>
          </a>
        </div>
      </div>
      <div class="buttons">
        <button class="button">Subscribe</button>
        <button class="button">Message</button>
      </div>

      <div class="analytics">
        <div class="data">
            <i class="fa-regular fa-heart"></i>
            <span class="number">80k</span>
        </div>
        <div class="data">
            <i class="fa-regular fa-message"></i>
            <span class="number">30k</span>
        </div>
        <div class="data">
            <i class="fa-solid fa-share"></i>
            <span class="number">40k</span>
        </div>
      </div>
    </div>
  </body>
</html>

<script
  src="https://kit.fontawesome.com/1d4bb831de.js"
  crossorigin="anonymous"
></script>
